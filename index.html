<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Demo | Experience the Future</title>
    <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
    <style>
        :root {
            --primary: #854fff;
            --secondary: #6b3fd4;
            --bg: #030014;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('hero.png') no-repeat center center;
            background-size: cover;
            opacity: 0.6;
            filter: blur(10px);
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg) 70%);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(133, 79, 255, 0.1);
            border: 1px solid rgba(133, 79, 255, 0.2);
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(133, 79, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(133, 79, 255, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <main class="content">
        <div class="badge">✨ Nuovo Chatbot Widget v1.0</div>
        <h1>L'intelligenza artificiale al servizio dei tuoi visitatori.</h1>
        <p>Prova subito l'integrazione fluida e il design premium del nostro nuovo widget chatbot basato su n8n.</p>
        <button class="btn-primary" onclick="document.querySelector('.chat-toggle').click()">Parla con noi</button>
    </main>

    <!-- Chatbot Widget Configuration -->
    <script>
        window.ChatWidgetConfig = {
            webhook: {
                url: 'https://n8n.srv1290246.hstgr.cloud/webhook/65426c8d-65ae-4ac4-ae75-eedb7afb3808',
                route: 'general'
            },
            branding: {
                logo: 'URL_LOGO_CLIENTE',
                name: 'NOME_CLIENTE',
                welcomeText: 'Ciao! Come posso aiutarti?',
                poweredBy: {
                    text: 'Powered by Taskio',
                    link: 'https://tuosito.it'
                }
            },
            style: {
                primaryColor: '#854fff',
                secondaryColor: '#6b3fd4',
                position: 'right'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/Thomas-Piva/n8n-chatbot-template@main/chat-widget.js"></script>
    <!-- Fine N8N Chatbot Widget -->
</body>

</html>
